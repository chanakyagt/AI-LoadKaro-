<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Dictation</title>
  <link rel="stylesheet" href="recorder.css">
</head>
<body>
  <div class="app">
    <h2>Voice Dictation</h2>
    <button id="recordBtn">🎤 Start</button>
    <div id="status">Idle</div>
    <textarea id="transcript" placeholder="Speak here..."></textarea>
    <button id="copyBtn">Copy & Stop</button>
    <button id="clearBtn">Clear</button>
  </div>
  <script src="recorder.js"></script>
</body>
</html>
